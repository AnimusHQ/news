name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Scan repository for secrets
        run: go run ./cmd/animus-news scan-secrets .

      - name: Validate pilot episode
        run: go run ./cmd/animus-news validate-episode episodes/0001-after-git-push

      - name: Dry run pilot episode
        run: go run ./cmd/animus-news dry-run episodes/0001-after-git-push
